name: auto-format

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

env:
  GH_TOKEN: ${{ github.token }}

permissions:
  contents: write
  pull-requests: write

jobs:
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      changed_files_json: ${{ steps.changed-files.outputs.changed_files_json }}
    steps:
      - uses: actions/checkout@v6
      - id: changed-files
        name: Check changed files
        uses: CCBR/actions/changed-files@latest
        with:
          paths: |
            **.mermaid
            **.mmd
            README.qmd
  auto-format:
    runs-on: ubuntu-latest
    needs: changed-files
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref ||
            github.ref_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          quarto-version: 1.9

      - name: git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup mermaid-cli
        uses: AnimMouse/setup-mermaid-cli@v1
      - name: Render Mermaid diagram SVG
        if: contains(needs.changed-files.outputs.changed_files_json, '.mermaid') ||
          contains(needs.changed-files.outputs.changed_files_json, '.mmd')
        env:
          CHANGED_FILES_JSON: ${{ needs.changed-files.outputs.changed_files_json }}
        run: |
          
          for input in $(echo '${CHANGED_FILES_JSON}' | jq -r '.[] | select(endswith(".mermaid") or endswith(".mmd"))')
          do
            output="${input%.mermaid}.svg"
            output="${output%.mmd}.svg"
            mmdc -i "$input" -o "$output"
            git add "$output"
          done
          git commit -m "ci: 🧜‍♀️ update mermaid diagram SVGs" && git push || echo "nothing to commit"

      - name: render readme
        if: contains(needs.changed-files.outputs.changed_files_json, 'README.qmd')
        run: |
          quarto render README.qmd --to gfm --output README.md
          git add README.md
          git commit -m "ci: 📑 render readme" && git push || echo "nothing to commit"
