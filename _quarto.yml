project:
  type: website
  title: "reproducible-toolchain"
  output-dir: _site
  resources:
    - poster/*.pdf

website:
  repo-url: https://github.com/CCBR/reproducible-toolchain
  repo-actions: [edit, issue]
  site-url: https://ccbr.github.io/reproducible-toolchain
  search: false
  sidebar:
    contents:
      - text: Poster for ISMB BOSC 2026
        href: poster/BOSC-2026.qmd
      - text: Abstract for Reproducibility in Science 2026
        href: abstract/reproducibility-2026.qmd
      - text: Slides for ABCS Technical Workshop 2026
        href: slides/abcs-tech-workshop-2026-05.qmd
  navbar:
    right: 
      - icon: github
        menu:
        - text: Repo
          href: https://github.com/CCBR/reproducible-toolchain
        - text: Issues
          href: https://github.com/CCBR/reproducible-toolchain/issues
          
  page-footer:
    left: |
      Created by the
      [CCR Collaborative Bioinformatics Resource](https://github.com/CCBR)

execute:
  freeze: auto

format:
  fnl-html:
    embed-resources: true
    code-fold: true
    toc: true